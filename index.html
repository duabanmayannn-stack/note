<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Notes</title>

	<style>
		body {
			background-color: #748450;
			font-family: monospace;
			font-style: italic;
			margin: 0;
			padding: 20px;
			box-sizing: border-box;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		h1 {
			color: #F9CDD5;
			text-align: center;
			font-size: clamp(28px, 5vw, 40px); /* Mo-shrink ang size sa phone */
			margin-bottom: 20px;
		}

		/* Kani ang sudlanan sa tibuok content para mag-align silang tanan */
		.main-container {
			display: flex;
			flex-direction: row;
			align-items: center;
			justify-content: center;
			width: 100%;
			max-width: 1200px;
			gap: 20px;
			position: relative;
		}

		.image-container {
			display: flex;
			justify-content: center;
			align-items: center;
		}

		/* Gi-flexible nato ang size sa mga images */
		#junhan {
			height: auto;
			max-height: 250px;
			width: auto;
			max-width: 100%;
		}

		#verie {
			height: auto;
			max-height: 180px;
			width: auto;
			max-width: 100%;
		}

		.textarea-container {
			flex-grow: 1;
			display: flex;
			justify-content: center;
			width: 100%;
			max-width: 600px; /* Limit sa gilapdon sa desktop */
		}

		textarea {
			width: 100%;
			height: 400px;
			border: solid 5px white;
			padding: 20px;
			box-sizing: border-box;
			outline: none;
			background-color: #F9CDD5;
			color: #748450;
			font-family: monospace;
			font-style: italic;
			font-size: 20px;
			border-radius: 30px;
			resize: none; /* Gi-disable para dili maguba ang layout kung guyoron */
		}

		/* 📱 MEDIA QUERY: Para sa mga Phone ug Tablet (Screens nga mas gamay sa 768px) */
		@media (max-width: 768px) {
			.main-container {
				flex-direction: column; /* Ipapanaog ang mga elements imbes nga magkilid */
				gap: 15px;
			}

			/* Ipapwesto ang mga images sa ibabaw sa textarea para limpyo tan-awon sa phone */
			.image-container {
				order: 1; 
				display: flex;
				justify-content: space-around;
				width: 100%;
			}

			.textarea-container {
				order: 2;
				width: 90%; /* Mas lapad gamay sa phone para sayon sulatan */
			}

			textarea {
				height: 300px; /* Gikubsan gamay ang gitas-on sa phone */
				font-size: 18px;
			}

			#junhan, #verie {
				max-height: 150px; /* Gipadunggan og gamay sa phone para dili saba sa screen */
			}
		}
	</style>
</head>
<body>

		<div>
			<h1>ꕤ࿔ 🍵 ༘⋆ Notes˗ˏˋ 🍓 ˎˊ˗</h1>
		</div>

		<div class="main-container">
			
			<div class="image-container">
				<img id="junhan" src="junhan.png" alt="Junhan">
			</div>

			<div class="textarea-container">
				<textarea name="note" placeholder="what's up?"></textarea>
			</div>

			<div class="image-container">
				<img id="verie" src="verie.png" alt="Verie">
			</div>

		</div>

</body>
</html>
